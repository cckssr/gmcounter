name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

env:
  INSTALL_EXTRAS: dev
  LINT_DIRS: gmcounter tests
  TEST_COV: gmcounter

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: python -m pip install -e ".[${INSTALL_EXTRAS}]"

      - name: Check formatting (ruff)
        run: ruff format --check $LINT_DIRS

      - name: Lint (ruff)
        run: ruff check $LINT_DIRS --output-format=concise --ignore D100,D101,D102,D103,D104,D105,D106,D107
        # Ignore docstring warnings since many functions lack docstrings and we don't want to enforce them yet.

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies for PySide6
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libegl1 libopengl0 libgl1

      - name: Install dev dependencies
        run: python -m pip install -e ".[${INSTALL_EXTRAS}]"

      - name: Run tests with coverage
        run: pytest --cov=$TEST_COV --cov-report=term-missing

      - name: Summary
        if: always()
        run: |
          echo "## Test Results (Python ${{ matrix.python-version }})" >> $GITHUB_STEP_SUMMARY
          echo "QT_QPA_PLATFORM=$QT_QPA_PLATFORM" >> $GITHUB_STEP_SUMMARY
