name: Version Sync and Release

on:
  push:
    branches:
      - main
      - master
    paths:
      - pyproject.toml
  workflow_dispatch:
    inputs:
      force_release:
        description: Force release even if version unchanged
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  PROJECT_NAME: GMCounter
  REPOSITORY_URL: https://github.com/${{ github.repository }}
  CLI_COMMAND: gmcounter
  MODULE_COMMAND: python -m gmcounter

jobs:
  sync-version-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Extract version from pyproject.toml
        id: get_version
        run: |
          python - <<'PYEOF'
          from __future__ import annotations

          import os
          import tomllib

          with open("pyproject.toml", "rb") as file_handle:
              version = tomllib.load(file_handle)["project"]["version"]

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"version={version}\n")

          print(f"Extracted version: {version}")
          PYEOF

      - name: Check if version tag already exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.get_version.outputs.version }}" >/dev/null 2>&1; then
            echo "tag_exists=true" >> $GITHUB_OUTPUT
            echo "Tag v${{ steps.get_version.outputs.version }} already exists"
          else
            echo "tag_exists=false" >> $GITHUB_OUTPUT
            echo "Tag v${{ steps.get_version.outputs.version }} does not exist"
          fi

      - name: Sync version in Python package
        if: steps.check_tag.outputs.tag_exists == 'false' || github.event.inputs.force_release == 'true'
        run: |
          VERSION="${{ steps.get_version.outputs.version }}" python - <<'PYEOF'
          from __future__ import annotations

          import os
          import re
          from pathlib import Path

          version = os.environ["VERSION"]
          target = Path("gmcounter/__init__.py")

          text = target.read_text(encoding="utf-8")
          updated, count = re.subn(
              r'^__version__\s*=\s*"[^"]*"$',
              f'__version__ = "{version}"',
              text,
              count=1,
              flags=re.MULTILINE,
          )
          if count != 1:
              raise RuntimeError("Could not update version in gmcounter/__init__.py")

          target.write_text(updated, encoding="utf-8")
          print(f"Updated {target}")
          PYEOF

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet; then
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "changes=true" >> $GITHUB_OUTPUT
            git diff --stat
          fi

      - name: Commit version changes
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git commit -m "chore: sync version to ${{ steps.get_version.outputs.version }}"
          git push

      - name: Create Release
        if: steps.check_tag.outputs.tag_exists == 'false' || github.event.inputs.force_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: Release v${{ steps.get_version.outputs.version }}
          body: |
            ## ${{ env.PROJECT_NAME }} v${{ steps.get_version.outputs.version }}

            ### Installation

            ```bash
            pip install git+${{ env.REPOSITORY_URL }}.git@v${{ steps.get_version.outputs.version }}
            ```

            ### Launch

            ```bash
            ${{ env.CLI_COMMAND }}
            ```

            or via python:

            ```bash
            ${{ env.MODULE_COMMAND }}
            ```
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.version, 'a') || contains(steps.get_version.outputs.version, 'b') || contains(steps.get_version.outputs.version, 'rc') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## Version Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.get_version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag exists:** ${{ steps.check_tag.outputs.tag_exists }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Files changed:** ${{ steps.check_changes.outputs.changes }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check_tag.outputs.tag_exists }}" = "false" ]; then
            echo "- **Release created:** ✅ v${{ steps.get_version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Release created:** ❌ (tag already exists)" >> $GITHUB_STEP_SUMMARY
          fi
