name: Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag to release (e.g. v1.2.3)"
        required: true
        type: string

env:
  PROJECT_NAME: GMCounter
  CLI_COMMAND: gmcounter
  MODULE_COMMAND: python -m gmcounter
  REPOSITORY_URL: https://github.com/${{ github.repository }}

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build wheel and publish release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tool
        run: python -m pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: List artifacts
        run: ls -lh dist/

      - name: Detect prerelease
        id: pre
        run: |
          TAG_NAME="${{ inputs.tag_name }}"
          if echo "$TAG_NAME" | grep -qE "(a|b|rc)[0-9]+$"; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
            echo "This is a pre-release: $TAG_NAME"
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
            echo "This is a stable release: $TAG_NAME"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          name: Release ${{ inputs.tag_name }}
          prerelease: ${{ steps.pre.outputs.is_prerelease }}
          generate_release_notes: true
          body: |
            ## ${{ env.PROJECT_NAME }} ${{ inputs.tag_name }}

            Python package release published from this repository.

            ### Installation

            ```bash
            pip install git+${{ env.REPOSITORY_URL }}.git@${{ inputs.tag_name }}
            ```

            Or install the latest stable release:

            ```bash
            pip install git+${{ env.REPOSITORY_URL }}.git
            ```

            ### Launch

            ```bash
            ${{ env.CLI_COMMAND }}
            ```

            or via python:

            ```bash
            ${{ env.MODULE_COMMAND }}
            ```

            See the [README](${{ env.REPOSITORY_URL }}#readme) for package-specific
            installation details and configuration options.
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag:** \`${{ inputs.tag_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Pre-release:** ${{ steps.pre.outputs.is_prerelease }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Artifacts:**" >> $GITHUB_STEP_SUMMARY
          ls dist/ | while read f; do echo "  - \`$f\`" >> $GITHUB_STEP_SUMMARY; done
