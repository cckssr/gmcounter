name: PR Label Release

on:
  pull_request_target:
    types: [closed]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: pr-label-release-${{ github.event.pull_request.base.ref }}
  cancel-in-progress: false

env:
  VERSION_FILES: |
    pyproject.toml
    gmcounter/__init__.py
    gmcounter/config.json

jobs:
  release-on-merge:
    if: github.event.pull_request.merged == true && (github.event.pull_request.base.ref == 'main' || github.event.pull_request.base.ref == 'master')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0

      - name: Determine bump type from PR labels
        id: bump
        env:
          PR_LABELS_JSON: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          python - <<'PYEOF'
          from __future__ import annotations

          import json
          import os

          labels = [label.lower() for label in json.loads(os.environ.get("PR_LABELS_JSON", "[]"))]

          major_labels = {"major", "semver:major", "release:major", "bump:major"}
          minor_labels = {"minor", "semver:minor", "release:minor", "bump:minor"}
          patch_labels = {"patch", "semver:patch", "release:patch", "bump:patch"}

          bump = ""
          if any(label in major_labels for label in labels):
              bump = "major"
          elif any(label in minor_labels for label in labels):
              bump = "minor"
          elif any(label in patch_labels for label in labels):
              bump = "patch"

          should_release = "true" if bump else "false"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"bump_type={bump}\n")
              output.write(f"should_release={should_release}\n")

          print(f"Labels: {labels}")
          if bump:
              print(f"Detected bump type: {bump}")
          else:
              print("No release label found. Supported labels: major/minor/patch or semver:major|minor|patch")
          PYEOF

      - name: Stop if no release label is set
        if: steps.bump.outputs.should_release != 'true'
        run: |
          echo "No matching release label found on merged PR." >> $GITHUB_STEP_SUMMARY
          echo "Add one of: major, minor, patch, semver:major, semver:minor, semver:patch" >> $GITHUB_STEP_SUMMARY

      - name: Set up Python
        if: steps.bump.outputs.should_release == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compute new version
        if: steps.bump.outputs.should_release == 'true'
        id: ver
        run: |
          python - <<'PYEOF'
          from __future__ import annotations

          import os
          import re
          from pathlib import Path

          bump = "${{ steps.bump.outputs.bump_type }}"

          pyproject = Path("pyproject.toml")
          match = re.search(r'^version\s*=\s*"([^"]+)"$', pyproject.read_text(encoding="utf-8"), re.MULTILINE)
          if not match:
              raise RuntimeError("Could not find version in pyproject.toml")

          current = match.group(1)
          base = re.sub(r"(?:a|b|rc)\d+$", "", current)
          major, minor, patch = (int(part) for part in base.split("."))

          if bump == "major":
              major += 1
              minor = 0
              patch = 0
          elif bump == "minor":
              minor += 1
              patch = 0
          else:
              patch += 1

          new_version = f"{major}.{minor}.{patch}"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"current_version={current}\n")
              output.write(f"new_version={new_version}\n")

          print(f"Current version: {current}")
          print(f"New version:     {new_version}")
          PYEOF

      - name: Update version files
        if: steps.bump.outputs.should_release == 'true'
        run: |
          VERSION="${{ steps.ver.outputs.new_version }}" python - <<'PYEOF'
          from __future__ import annotations

          import json
          import os
          import re
          from pathlib import Path

          version = os.environ["VERSION"]
          targets = [Path(line) for line in os.environ["VERSION_FILES"].splitlines() if line.strip()]

          for target in targets:
              if not target.exists():
                  raise RuntimeError(f"Missing version target: {target}")

              if target.suffix == ".toml":
                  text = target.read_text(encoding="utf-8")
                  updated, count = re.subn(r'^version\s*=\s*"[^"]*"$', f'version = "{version}"', text, count=1, flags=re.MULTILINE)
                  if count != 1:
                      raise RuntimeError(f"Could not update version in {target}")
                  target.write_text(updated, encoding="utf-8")
                  continue

              if target.suffix == ".py":
                  text = target.read_text(encoding="utf-8")
                  updated, count = re.subn(r'^__version__\s*=\s*"[^"]*"$', f'__version__ = "{version}"', text, count=1, flags=re.MULTILINE)
                  if count != 1:
                      raise RuntimeError(f"Could not update version in {target}")
                  target.write_text(updated, encoding="utf-8")
                  continue

              if target.suffix == ".json":
                  payload = json.loads(target.read_text(encoding="utf-8"))
                  if not isinstance(payload, dict) or "version" not in payload:
                      raise RuntimeError(f"JSON target does not contain a top-level version field: {target}")
                  payload["version"] = version
                  target.write_text(json.dumps(payload, indent=2, ensure_ascii=False) + "\n", encoding="utf-8")
                  continue

              raise RuntimeError(f"Unsupported version target: {target}")
          PYEOF

      - name: Commit, tag, and push
        if: steps.bump.outputs.should_release == 'true'
        run: |
          VERSION="${{ steps.ver.outputs.new_version }}"
          TAG="v$VERSION"

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add pyproject.toml gmcounter/__init__.py gmcounter/config.json
          git commit -m "chore(release): bump version to $TAG (#${{ github.event.pull_request.number }})"
          git tag "$TAG"
          git push origin "${{ github.event.pull_request.base.ref }}"
          git push origin "$TAG"

      - name: Create GitHub release
        if: steps.bump.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.new_version }}
          name: Release v${{ steps.ver.outputs.new_version }}
          prerelease: false
          generate_release_notes: true
          body: |
            ## ${{ github.repository }} v${{ steps.ver.outputs.new_version }}

            Automatically released from merged PR #${{ github.event.pull_request.number }}.

            Bump type: `${{ steps.bump.outputs.bump_type }}`

            ### Installation

            ```bash
            pip install git+https://github.com/${{ github.repository }}.git@v${{ steps.ver.outputs.new_version }}
            ```

            ### Launch

            ```bash
            gmcounter
            ```

            or via python:

            ```bash
            python -m gmcounter
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        if: steps.bump.outputs.should_release == 'true'
        run: |
          echo "## PR Label Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "- PR: #${{ github.event.pull_request.number }}" >> $GITHUB_STEP_SUMMARY
          echo "- Bump type: ${{ steps.bump.outputs.bump_type }}" >> $GITHUB_STEP_SUMMARY
          echo "- New version: ${{ steps.ver.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Tag: v${{ steps.ver.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
