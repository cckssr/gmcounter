; PlatformIO Project Configuration File
;
; https://docs.platformio.org/page/projectconf.html
[common]
build_flags =
    '-DFW_VERSION="2.2.1"'
    -DUSE_CYCLE_COUNTER=1

[env:uno_r4_minima]
platform = renesas-ra
board    = uno_r4_minima
framework = arduino
monitor_echo = yes
build_flags = 
    ${common.build_flags}
    '-DDEVICE_SERIAL="UNKWN"'

[env:uno_E20134]
extends = env:uno_r4_minima
build_flags =
    ${common.build_flags}
    '-DDEVICE_SERIAL="E20134"'

[env:uno_E97675]
extends = env:uno_r4_minima
build_flags =
    ${common.build_flags}
    '-DDEVICE_SERIAL="E97675"'

[env:uno_E92106]
extends = env:uno_r4_minima
build_flags =
    ${common.build_flags}
    '-DDEVICE_SERIAL="E92106"'

[env:uno_E83750]
extends = env:uno_r4_minima
build_flags =
    ${common.build_flags}
    '-DDEVICE_SERIAL="E83750"'

[env:uno_E34250]
extends = env:uno_r4_minima
build_flags =
    ${common.build_flags}
    '-DDEVICE_SERIAL="E34250"'

[env:uno_E73774]
extends = env:uno_r4_minima
build_flags =
    ${common.build_flags}
    '-DDEVICE_SERIAL="E73774"'

; ── Native unit-test environment ─────────────────────────────────────────────
; Runs on the host (macOS/Linux) without any hardware.
; Each test/ subdirectory is compiled as an independent binary.
; Source files are NOT compiled automatically (test_build_src = no);
; each test includes exactly the .cpp files it needs.
[env:native]
platform = native
; Intercept #include <Arduino.h> with test/Arduino.h → arduino_mock.h.
build_flags     = -std=c++17 -I test -I src
test_build_src  = no
